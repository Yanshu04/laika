version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - LAIKA_DATA_DIR=/app/data
      - LAIKA_DATABASE_URL=sqlite:////app/data/metadata.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
    volumes:
      - laika-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - LAIKA_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  laika-data:
    driver: local
